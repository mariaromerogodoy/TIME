<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transparent QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
      body {
        font-family: Helvetica, Arial, sans-serif;
        padding: 24px;
        background: #f5f5f5;
        color: #111;
      }

      .wrap {
        max-width: 500px;
        margin: 0 auto;
      }

      label {
        display: block;
        margin: 16px 0 8px;
      }

      input,
      button {
        font: inherit;
      }

      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
      }

      input[type="color"] {
        width: 70px;
        height: 40px;
        border: none;
        background: none;
        padding: 0;
      }

      button {
        margin-top: 16px;
        padding: 10px 16px;
        border: 1px solid #111;
        background: white;
        cursor: pointer;
      }

      canvas {
        display: block;
        margin-top: 24px;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>QR Code Generator</h1>

      <label for="qrText">Text or URL</label>
      <input type="text" id="qrText" value="https://example.com" />

      <label for="qrColor">QR Code Color</label>
      <input type="color" id="qrColor" value="#000000" />

      <br />
      <button onclick="generateQR()">Generate QR</button>
      <button onclick="downloadQR()">Download PNG</button>

      <canvas id="qrCanvas"></canvas>
    </div>

    <script>
      const canvas = document.getElementById("qrCanvas");

      function generateQR() {
        const text = document.getElementById("qrText").value.trim();
        const color = document.getElementById("qrColor").value;

        if (!text) return;

        QRCode.toCanvas(
          canvas,
          text,
          {
            width: 300,
            margin: 1,
            color: {
              dark: color,
              light: "#0000", // transparent background
            },
          },
          function (error) {
            if (error) console.error(error);
          }
        );
      }

      function downloadQR() {
        const link = document.createElement("a");
        link.download = "qr-code.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      generateQR();
    </script>
  </body>
</html>
